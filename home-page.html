<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Check Bus</title>
</head>
<body>
    <main>
        <form>
            <div class="profile-box"><img  src="/images (2).jpeg" alt="profile pic" class="profile-pic"></div>
            <div class="search-input-box"><label for="search-input">Enter your Board Point</label>
                <input type="search" name="search-input" id="search-input" class="search-input" placeholder="Enter The Point"></div>
            
            <div class="board-points">
                <div class="board-points-box">
                    <div class="destination-box">
                        <p class="destination">Hasthinapuram</p>
                        <p class="seats-left">15 seats left</p>
                    </div>
                    <div class="time-box">
                        <p class="timing">8:00 AM - 8:50 AM</p>
                        <button class="check-availability-btn">Check-Availability</button>
                    </div>
                </div>

                <div class="board-points-box">
                    <div class="destination-box">
                        <p class="destination">T Nagar</p>
                        <p class="seats-left">15 seats left</p>
                    </div>
                    <div class="time-box">
                        <p class="timing">7:15 AM  - 8:30 AM</p>
                        <button class="check-availability-btn">Check-Availability</button>
                    </div>
                </div>

                <div class="board-points-box">
                    <div class="destination-box">
                        <p class="destination">Korattur</p>
                        <p class="seats-left">15 seats left</p>
                    </div>
                    <div class="time-box">
                        <p class="timing">7:15 AM  - 8:30 AM</p>
                        <button class="check-availability-btn">Check-Availability</button>
                    </div>
                </div>

                <div class="board-points-box">
                    <div class="destination-box">
                        <p class="destination">Thiruporur</p>
                        <p class="seats-left">15 seats left</p>
                    </div>
                    <div class="time-box">
                        <p class="timing">7:30 AM  - 8:45 AM</p>
                        <button class="check-availability-btn">Check-Availability</button>
                    </div>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
